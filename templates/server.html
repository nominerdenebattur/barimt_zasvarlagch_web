{% extends 'base.html' %}

{% block title %}Серверийн үзүүлэлт{% endblock %}

{% block extra_head %}
<style>
  main {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 24px;
    align-items: start;
  }
  .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,.04);
    }
    .form-section {
      padding: 16px;
      position: sticky;
      top: 16px;
    }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
    }
.form-group small { color: var(--muted); }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(42,157,244,.15);
    }
.document-section { padding: 16px; }
    .document-header {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .document-header .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .doc-title { margin: 0; }
    .date-filter {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .date-filter input[type="date"] {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      outline: none;
    }
    .document-box {
      position: relative;
      width: 100%;
      max-height: 70vh;
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow-x: hidden;
      overflow-y: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-family: Arial, sans-serif;
    }
    thead th {
      position: sticky;
      top: 0;
      background: var(--brand);
      color: #fff;
      text-align: left;
      padding: 10px;
      z-index: 10;
    }
    tbody td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    tbody tr:hover { background: #f3f4f6; }
    /* Autocomplete list */

        /* Suggestion list container */
        #suggestions {
            position: absolute;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 0;
            margin-top: 2px;
        }

        /* Each suggestion item */
        #suggestions li {
            list-style: none;
            padding: 8px 12px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            font-size: 14px;
        }

        /* Hover effect */
        #suggestions li:hover {
            background-color: #2a9df4;
            color: #fff;
        }

        /* Optional: highlight selected with keyboard (active class) */
        #suggestions li.active {
            background-color: #0b78d1;
            color: #fff;
        }

        /* Helper chips */

        .helper {
            font-size: 12px;
            color: var(--muted);
            margin-top: 6px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 12px;
            margin-top: 12px;
            background: var(--card);
            border-top: 1px solid var(--border);
            border-radius: 0 0 10px 10px;
        }

        .pagination span {
            font-size: 13px;
            color: var(--muted);
        }
    .submit-section {
        display: flex;
        justify-content: center;
        padding: 20px 12px;

    }
        /* Responsive */
        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
                padding: 20px 16px;
            }

            .form-grid {
                max-height: none;
                position: static;
                grid-template-columns: 1fr;
            }

            .submit-section .btn {
                width: 100%;
            }
        }
</style>
{% endblock %}
